name: flinku_sdk
description: The official Flutter SDK for Flinku — deferred deep linking for iOS and Android. Firebase Dynamic Links replacement.
version: 0.3.1
homepage: https://flinku.dev
repository: https://github.com/flinku-dev/flutter-sdk
issue_tracker: https://github.com/flinku-dev/flutter-sdk/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

topics:
  - deep-linking
  - firebase
  - deferred-deep-linking
  - dynamic-links
